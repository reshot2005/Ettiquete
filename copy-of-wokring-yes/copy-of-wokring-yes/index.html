<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etiquette - LMS</title>
    <!-- Removed external Google Fonts to prevent network errors in preview -->
    <style>
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
        }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .bento-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bento-card:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 30px 60px -12px rgba(139, 92, 246, 0.15), 0 18px 36px -18px rgba(0, 0, 0, 0.1);
        }
        /* Comic specific styles */
        .comic-panel {
            border: 4px solid #000;
            box-shadow: 8px 8px 0px #000;
            background: white;
            position: relative;
            overflow: hidden;
        }
        .speech-bubble {
            position: relative;
            background: #fff;
            border: 3px solid #000;
            border-radius: 20px;
            padding: 15px 20px;
            font-weight: 800;
            color: #000;
            filter: drop-shadow(4px 4px 0px #000);
        }
        .speech-bubble:after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 30px;
            border-width: 15px 15px 0;
            border-style: solid;
            border-color: #000 transparent;
            display: block;
            width: 0;
        }
        .speech-bubble-jagged {
            position: relative;
            background: #fff;
            border: 4px solid #000;
            clip-path: polygon(0% 15%, 15% 15%, 15% 0%, 85% 0%, 85% 15%, 100% 15%, 100% 85%, 85% 85%, 85% 100%, 15% 100%, 15% 85%, 0% 85%);
            padding: 20px;
            font-weight: 900;
            color: #000;
            filter: drop-shadow(6px 6px 0px #000);
        }
        .action-lines {
            background-image: radial-gradient(circle, transparent 20%, #fff 20%, #fff 80%, transparent 80%, transparent), radial-gradient(circle, transparent 20%, #fff 20%, #fff 80%, transparent 80%, transparent);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            background-color: #e2e8f0;
            opacity: 0.2;
        }
        .halftone {
            background-image: radial-gradient(#000 1px, transparent 0);
            background-size: 4px 4px;
            opacity: 0.05;
        }
        /* Ensure overlays are on top */
        .gamification-fx-layer {
            z-index: 99999 !important;
            pointer-events: none;
        }
    </style>
