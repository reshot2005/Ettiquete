<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test - Etiquette LMS</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f8fafc;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: #1e293b; margin-top: 0; }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            background: #4f46e5;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background: #4338ca; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        .log {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        .log div { margin: 4px 0; }
        .success { color: #059669; }
        .error { color: #dc2626; }
        .info { color: #0284c7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Login Test</h1>
        <p>Test the admin login flow directly</p>
        
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" value="etiqettelms@gmail.com" required>
            <input type="password" id="password" placeholder="Password" value="Akshara@123" required>
            <button type="submit" id="loginBtn">Login</button>
        </form>
        
        <button onclick="testProfile()" style="margin-top: 10px; background: #059669;">Test Profile (After Login)</button>
        <button onclick="clearAll()" style="margin-top: 10px; background: #dc2626;">Clear Token & Reload</button>
        
        <div class="log" id="log"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:3001/api';
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = type;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            
            btn.disabled = true;
            btn.textContent = 'Logging in...';
            
            log('🔄 Starting login...', 'info');
            log(`Email: ${email}`, 'info');
            
            try {
                log(`📡 POST ${API_URL}/auth/login`, 'info');
                
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                log(`📥 Response status: ${response.status}`, response.ok ? 'success' : 'error');
                
                if (!response.ok) {
                    const error = await response.text();
                    throw new Error(`Login failed: ${error}`);
                }
                
                const data = await response.json();
                
                if (data.token) {
                    localStorage.setItem('auth_token', data.token);
                    log('✅ Token received and stored!', 'success');
                    log(`Token (first 50 chars): ${data.token.substring(0, 50)}...`, 'info');
                    log('💾 Stored in localStorage as "auth_token"', 'success');
                    
                    // Auto-test profile
                    setTimeout(() => testProfile(), 500);
                } else {
                    throw new Error('No token in response');
                }
                
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
                
                if (error.message.includes('Failed to fetch')) {
                    log('💡 Backend server is not running!', 'error');
                    log('   Start it with: cd server && npm run dev', 'info');
                }
            } finally {
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        });

        async function testProfile() {
            const token = localStorage.getItem('auth_token');
            
            if (!token) {
                log('❌ No token found. Login first!', 'error');
                return;
            }
            
            log('🔄 Testing profile endpoint...', 'info');
            log(`📡 GET ${API_URL}/profiles/me`, 'info');
            
            try {
                const response = await fetch(`${API_URL}/profiles/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                log(`📥 Response status: ${response.status}`, response.ok ? 'success' : 'error');
                
                if (!response.ok) {
                    const error = await response.text();
                    throw new Error(`Profile fetch failed: ${error}`);
                }
                
                const profile = await response.json();
                
                log('✅ Profile loaded successfully!', 'success');
                log(`👤 Name: ${profile.name}`, 'success');
                log(`📧 Email: ${profile.email}`, 'success');
                log(`🎭 Role: ${profile.role}`, 'success');
                log(`🆔 ID: ${profile.id}`, 'success');
                log(`⭐ XP: ${profile.xp || 0}`, 'success');
                
                if (profile.role === 'platform_admin') {
                    log('🎉 Admin role confirmed! Should redirect to /admin', 'success');
                } else if (profile.role === 'hr') {
                    log('🎉 HR role confirmed! Should redirect to /hr', 'success');
                } else {
                    log('🎉 Employee role confirmed! Should redirect to /employee', 'success');
                }
                
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
                
                if (error.message.includes('401') || error.message.includes('403')) {
                    log('💡 Token is invalid or expired', 'error');
                    log('   Try logging in again', 'info');
                }
            }
        }

        function clearAll() {
            localStorage.clear();
            log('🗑️ Cleared localStorage', 'info');
            log('🔄 Reloading page...', 'info');
            setTimeout(() => location.reload(), 500);
        }

        // Check on load
        window.addEventListener('load', () => {
            const token = localStorage.getItem('auth_token');
            if (token) {
                log('ℹ️ Found existing token in localStorage', 'info');
                log(`Token (first 50 chars): ${token.substring(0, 50)}...`, 'info');
            } else {
                log('ℹ️ No token found. Please login.', 'info');
            }
            log('ℹ️ Backend should be running on: http://localhost:3001', 'info');
        });
    </script>
</body>
</html>
